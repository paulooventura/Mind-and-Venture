<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;overscroll-behavior:none;}
body{background:#04020a;display:flex;flex-direction:column;align-items:center;
  padding:8px;font-family:monospace;gap:4px;}
canvas{image-rendering:auto;
  image-rendering:-moz-crisp-edges;image-rendering:-webkit-optimize-contrast;
  -ms-interpolation-mode:nearest-neighbor;max-width:100%;width:100%;height:auto;
  border:1px solid #1a1a30;cursor:crosshair;touch-action:none;}
/* ── Switch-style on-screen controller ── */
#gamepad{
  display:flex;align-items:flex-end;justify-content:space-between;
  width:min(100%,560px);max-width:100%;
  padding:14px 18px 18px;margin-top:4px;
  background:linear-gradient(180deg,#3d3d48 0%,#252530 55%,#1c1c26 100%);
  border-radius:32px 32px 40px 40px;
  border:2px solid #4a4a58;
  box-shadow:0 10px 28px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.1);
  touch-action:none;user-select:none;gap:6px;
}
.gp-grip{flex:1;display:flex;align-items:center;min-width:0;}
.gp-left{justify-content:flex-start;padding-left:4px;}
.gp-right{justify-content:flex-end;padding-right:4px;}
.gp-center{display:flex;flex-direction:column;gap:6px;flex-shrink:0;align-items:center;padding-bottom:6px;}
.gp-util{
  background:#1a1a24;color:#6a8;border:1px solid #3a3a48;
  border-radius:10px;padding:5px 10px;font:bold 9px monospace;
  cursor:pointer;touch-action:none;user-select:none;
  box-shadow:0 2px 0 #0a0a12,inset 0 1px 0 rgba(255,255,255,.06);
}
.gp-util:active{transform:translateY(1px);box-shadow:0 1px 0 #0a0a12;}
#bTest{color:#6f6;background:#0a1a0a;border-color:#1a4a1a;}
#bRst{color:#fc6;background:#1a1408;border-color:#4a3a10;}
/* Analog stick (left Joy-Con) */
.analog-stick{
  position:relative;width:120px;height:120px;flex-shrink:0;
  touch-action:none;user-select:none;
}
.stick-base{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#4a4a58,#22222e 70%);
  border:2px solid #3a3a48;
  box-shadow:inset 0 4px 12px rgba(0,0,0,.45),0 2px 0 rgba(255,255,255,.06);
}
.stick-knob{
  position:absolute;left:50%;top:50%;
  width:52px;height:52px;margin:-26px 0 0 -26px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#6a6a7a,#363644);
  border:2px solid #4a4a58;
  box-shadow:0 4px 10px rgba(0,0,0,.4),inset 0 2px 4px rgba(255,255,255,.12);
  pointer-events:none;
  transition:transform .04s ease-out;
  will-change:transform;
}
.stick-base::after{
  content:'';position:absolute;left:50%;top:50%;
  width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;
  background:#1a1a24;opacity:.6;
}
/* Face buttons (right Joy-Con diamond) */
.face-buttons{position:relative;width:120px;height:120px;flex-shrink:0;}
.face{
  position:absolute;width:46px;height:46px;border:none;border-radius:50%;
  font:bold 10px/1.1 monospace;cursor:pointer;touch-action:none;user-select:none;
  box-shadow:0 5px 0 rgba(0,0,0,.38),inset 0 2px 5px rgba(255,255,255,.28);
  text-shadow:0 1px 1px rgba(0,0,0,.35);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.face:active{transform:translateY(2px);box-shadow:0 3px 0 rgba(0,0,0,.38);}
.face-top{top:0;left:37px;background:linear-gradient(145deg,#ffe060,#d0a010);color:#320;}
.face-right{top:37px;right:0;background:linear-gradient(145deg,#88ee88,#40b040);color:#030;}
.face-bottom{bottom:0;left:37px;background:linear-gradient(145deg,#6ed4ff,#2a9fd4);color:#023;}
.face-left{top:37px;left:0;background:linear-gradient(145deg,#ff7070,#d03040);color:#300;}
.face-lbl{display:block;font-size:8px;opacity:.85;margin-top:1px;}
@media (max-width:1100px){
  body{padding:4px;gap:3px;}
  #gamepad{padding:16px 20px 20px;border-radius:36px 36px 44px 44px;}
  .analog-stick{width:136px;height:136px;}
  .stick-knob{width:58px;height:58px;margin:-29px 0 0 -29px;}
  .face-buttons{width:136px;height:136px;}
  .face{width:52px;height:52px;font-size:11px;}
  .face-top{left:42px;}.face-bottom{left:42px;}.face-left,.face-right{top:42px;}
  .gp-util{padding:8px 12px;font-size:10px;min-height:36px;}
}
@media (display-mode:standalone){
  body{padding:2px;gap:2px;}
  #mvVer{display:none;}
}
#battleHud{display:none;box-sizing:border-box;position:fixed;top:0;left:0;right:0;z-index:9000;padding:18px 22px;background:linear-gradient(180deg,#1a0a22 0%,#120a1a 88%,transparent 100%);border-bottom:4px solid #e44;font-family:Segoe UI,system-ui,sans-serif;color:#fff;pointer-events:none;}
#battleHud .bh-title{font-size:clamp(32px,7vw,52px);font-weight:800;color:#f88;letter-spacing:.05em;margin-bottom:10px;text-align:center;text-shadow:0 2px 8px #000;}
#battleHud .bh-row{display:flex;justify-content:center;gap:clamp(16px,5vw,48px);flex-wrap:wrap;font-size:clamp(26px,5.5vw,42px);font-weight:800;}
#battleHud .bh-kills{color:#8feb8f;text-shadow:0 1px 4px #000;}
#battleHud .bh-deaths{color:#faa;text-shadow:0 1px 4px #000;}
#battleHud .bh-hp{color:#fff;text-shadow:0 1px 4px #000;}
#battleHud .bh-rival{margin-top:12px;text-align:center;font-size:clamp(28px,6vw,44px);font-weight:800;color:#fc8;text-shadow:0 2px 6px #000;}
#gameWrap{position:relative;display:inline-block;max-width:100%;}
</style>
</head>
<body>
<div id="mvVer" style="font-size:13px;color:#6f6;font-weight:bold;font-family:monospace;margin:4px 0">Mind &amp; Venture · Awdjoo · build 98</div>
<div id="battleHud">
  <div class="bh-title">BATTLE PRACTICE</div>
  <div class="bh-row">
    <span class="bh-kills" id="battleKills">KILLS 0</span>
    <span class="bh-deaths" id="battleDeaths">DEATHS 0</span>
    <span class="bh-hp" id="battleHp">HP 100</span>
  </div>
  <div class="bh-rival" id="battleRival">VS SIGNOL</div>
</div>
<div id="gameWrap">
<canvas id="c" width="1024" height="768"></canvas>
</div>
<div id="inf" style="font-size:10px;color:#0f0;min-height:16px;word-break:break-all;"></div>
<div id="gamepad">
  <div class="gp-grip gp-left">
    <div class="analog-stick" id="stickZone">
      <div class="stick-base"><div class="stick-knob" id="stickKnob"></div></div>
    </div>
  </div>
  <div class="gp-center">
    <button id="bTest" class="gp-util" type="button">🔬 TEST</button>
    <button id="bRst" class="gp-util" type="button">↺ RESET</button>
  </div>
  <div class="gp-grip gp-right">
    <div class="face-buttons">
      <button id="bE" class="face face-top" type="button" aria-label="Use item">USE<span class="face-lbl">E</span></button>
      <button id="bF" class="face face-left" type="button" aria-label="Punch">PUNCH<span class="face-lbl">F</span></button>
      <button id="bSp" class="face face-bottom" type="button" aria-label="Jump">JUMP<span class="face-lbl">space</span></button>
      <button id="bQ" class="face face-right" type="button" aria-label="Swap item">SWAP<span class="face-lbl">Q</span></button>
    </div>
  </div>
</div>
<p style="font-size:8px;color:#333;margin-top:4px;text-align:center;">
  Left stick move · ↓ duck · Jump / punch / use / swap on right
</p>
<script>
window.onerror=function(msg,src,line,col,err){
  var s=src?String(src):'';
  if(/inpage\.js|content[_-]?script|extension:\/\/|chrome-extension:|moz-extension:|safari-extension:/i.test(s)) return true;
  var inf=document.getElementById('inf');
  if(inf){
    inf.style.color='#ff0';
    var file=s?(s.split('/').pop().split('?')[0]):'?';
    inf.textContent='ERROR: '+msg+' ('+file+':'+line+')';
  }
  console.error('MV onerror',msg,src,line,err);
  return false;
};
</script>

<script>
if('serviceWorker' in navigator&&location.protocol!=='file:'){
  window.addEventListener('load',function(){
    var SW_BUILD='105';
    if(/[?&](selftest|ci)=/i.test(location.search)) return;
    var stored=localStorage.getItem('mv_sw_build');
    if(stored!==SW_BUILD||window.MV_BUILD!==SW_BUILD){
      localStorage.setItem('mv_sw_build',SW_BUILD);
      navigator.serviceWorker.getRegistrations().then(function(regs){
        return Promise.all(regs.map(function(r){return r.unregister();}));
      }).finally(function(){
        var q=location.search.replace(/^\?/,'');
        var bust='b='+SW_BUILD+'-'+Date.now();
        location.replace(location.pathname+'?'+(q?q+'&':'')+bust);
      });
      return;
    }
    navigator.serviceWorker.register('./sw.js?v='+SW_BUILD).catch(function(){});
  });
}
</script>
